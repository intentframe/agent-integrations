# Default governed-tool template (reference). Runtime user config lives under ~/.intentframe/.
# Select by tool name (not toolset). Reads stay unlisted unless deployment policy requires them.
#
# enabled: true  → IntentFrame gates at runtime (plugin wrap + adapter validate).
# enabled: false → spec kept in catalog; Hermes runs the tool ungoverned (no intent sent).
#
# builtin_module → Hermes module that registers this tool at import time (dev-owned preload map).
#   Must start with "tools."; plugin imports only for enabled tools before registry snapshot.
#
# User control: intentframe-integrations governance enable|disable hermes <tool>
#   writes ONLY the runtime copy (~/.intentframe/.../governance/tools.yaml).
#   Restart Hermes gateway + adapter after toggling (governance is cached at process start).
#
# Dev control: this repo template + generic_actions.manifest + agent.json + policy.yaml +
#   executor.yaml. Nothing at runtime auto-regenerates those files.
#
# Governance (enabled) and policy (allowed_actions) are independent gates — they do
# not need to stay in sync. Disabled tools never emit intents; policy rows for their
# action IDs can remain in the seeded policy harmlessly.

tools:
  terminal:
    enabled: true
    action: RUN_COMMAND
    risk: local_process
    mapper: terminal
    blocked_response: terminal_json
    builtin_module: tools.terminal_tool

  write_file:
    enabled: true
    action: WRITE_HOST_FILE
    risk: local_write
    mapper: write_file
    blocked_response: generic_json
    builtin_module: tools.file_tools

  patch:
    enabled: true
    action: WRITE_HOST_FILE
    actions: [WRITE_HOST_FILE, DELETE_HOST_FILE]
    risk: local_write
    mapper: patch
    blocked_response: generic_json
    builtin_module: tools.file_tools

  cronjob:
    enabled: true
    action: HERMES_CRONJOB
    risk: local_process
    mapper: generic
    blocked_response: generic_json
    builtin_module: tools.cronjob_tools
