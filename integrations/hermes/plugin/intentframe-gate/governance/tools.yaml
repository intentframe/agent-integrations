# Governed Hermes tools — bundled copy for plugin copy-installs.
# Canonical source: integrations/hermes/governance/tools.yaml

tools:
  terminal:
    action: RUN_COMMAND
    risk: local_process
    mapper: terminal
    blocked_response: terminal_json

  process:
    action: RUN_COMMAND
    risk: local_process
    mapper: process
    blocked_response: generic_json

  write_file:
    action: WRITE_HOST_FILE
    risk: local_write
    mapper: write_file
    blocked_response: generic_json

  delete_file:
    action: DELETE_HOST_FILE
    risk: local_delete
    mapper: delete_file
    blocked_response: generic_json

  patch:
    action: WRITE_HOST_FILE
    actions: [WRITE_HOST_FILE, DELETE_HOST_FILE]
    risk: local_write
    mapper: patch
    blocked_response: generic_json
