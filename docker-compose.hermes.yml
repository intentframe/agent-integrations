services:
  hermes-intentframe:
    image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
    container_name: hermes-intentframe
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      VERSION: ${VERSION:-main}
    volumes:
      - intentframe-data:/root/.intentframe
      - hermes-data:/root/.hermes
    command:
      - bash
      - -lc
      - |
        set -euo pipefail
        apt-get update
        apt-get install -y --no-install-recommends curl tar ca-certificates
        rm -rf /var/lib/apt/lists/*

        curl -fsSL https://github.com/intentframe/agent-integrations/raw/main/scripts/install-hermes.sh | bash

        exec /root/.intentframe/agent-integrations/bin/intentframe-integrations run hermes

volumes:
  intentframe-data:
  hermes-data:
